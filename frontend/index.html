<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planorama - AI Agent</title>
    <meta name="description" content="Planorama AI-powered wedding event planning assistant">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in { animation: slideIn 0.3s ease-out; }

        @keyframes bounce-dot {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .dot-1 { animation: bounce-dot 1.4s infinite ease-in-out -0.32s; }
        .dot-2 { animation: bounce-dot 1.4s infinite ease-in-out -0.16s; }
        .dot-3 { animation: bounce-dot 1.4s infinite ease-in-out; }

        /* Scrollbar */
        #chatHistory::-webkit-scrollbar { width: 6px; }
        #chatHistory::-webkit-scrollbar-track { background: transparent; }
        #chatHistory::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        #chatHistory::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="font-sans bg-slate-900 text-slate-50 m-0 h-screen flex justify-center items-center relative overflow-hidden">

    <!-- Background gradient blobs -->
    <div class="absolute top-0 left-0 w-[500px] h-[500px] bg-blue-500/15 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-violet-500/15 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Chat Container -->
    <div class="relative w-full max-w-3xl h-[90vh] bg-slate-800/70 backdrop-blur-xl border border-white/10 rounded-3xl flex flex-col shadow-2xl shadow-black/50 overflow-hidden">

        <!-- Header -->
        <div class="px-6 py-5 border-b border-white/[0.06] bg-slate-800/40 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-violet-500 flex items-center justify-center text-lg font-bold shadow-lg shadow-violet-500/20">P</div>
            <div>
                <h1 id="app-title" class="m-0 text-xl font-bold bg-gradient-to-r from-blue-400 to-violet-400 bg-clip-text text-transparent">Planorama ✨</h1>
                <p class="m-0 text-xs text-slate-400 tracking-wide">AI Event Planning Assistant</p>
            </div>
            <div class="ml-auto flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-400 shadow-lg shadow-emerald-400/50 animate-pulse"></span>
                <span class="text-xs text-slate-400">Online</span>
            </div>
        </div>

        <!-- Messages Area -->
        <div id="chatHistory" class="flex-1 px-6 py-6 overflow-y-auto flex flex-col gap-4">
            <div class="max-w-[80%] self-start bg-slate-700/80 border border-white/[0.06] px-5 py-3 rounded-2xl rounded-bl-sm text-[0.95rem] leading-relaxed animate-slide-in">
                Hello! I'm your Planorama AI assistant. How can I help you with your event planning today?
            </div>
            <div id="loadingIndicator" class="hidden self-start bg-slate-700/80 border border-white/[0.06] px-5 py-3 rounded-2xl rounded-bl-sm gap-1 items-center">
                <div class="w-2 h-2 bg-slate-300 rounded-full dot-1"></div>
                <div class="w-2 h-2 bg-slate-300 rounded-full dot-2"></div>
                <div class="w-2 h-2 bg-slate-300 rounded-full dot-3"></div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="px-6 py-5 bg-slate-800/60 border-t border-white/[0.06]">
            <form id="chatForm" class="flex gap-3">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Ask about guests, RSVPs, or send reminders..."
                    autocomplete="off"
                    required
                    class="flex-1 bg-slate-900/60 border border-white/10 px-5 py-3.5 rounded-full text-white text-[0.95rem] outline-none transition-all duration-200 placeholder:text-slate-500 focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20"
                >
                <button
                    type="submit"
                    class="bg-gradient-to-r from-blue-500 to-violet-500 border-none text-white px-7 py-3.5 rounded-full font-semibold cursor-pointer transition-all duration-200 hover:opacity-90 hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-violet-500/25"
                >
                    Send
                </button>
            </form>
        </div>
    </div>

<script>
    const sessionId = localStorage.getItem('planorama_session') ||
                      'session_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('planorama_session', sessionId);

    const form = document.getElementById('chatForm');
    const input = document.getElementById('userInput');
    const history = document.getElementById('chatHistory');
    const loading = document.getElementById('loadingIndicator');
    const sendBtn = document.querySelector('button[type="submit"]');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';

        sendBtn.disabled = true;
        input.disabled = true;

        loading.style.display = 'flex';
        history.appendChild(loading);
        history.scrollTop = history.scrollHeight;

        const aiDiv = document.createElement('div');
        aiDiv.className = 'max-w-[80%] self-start bg-slate-700/80 border border-white/[0.06] px-5 py-3 rounded-2xl rounded-bl-sm text-[0.95rem] leading-relaxed animate-slide-in';
        history.insertBefore(aiDiv, loading);

        let fullText = '';

        try {
            const response = await fetch('http://localhost:8001/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, session_id: sessionId })
            });

            loading.style.display = 'none';

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });

                const lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;

                    const data = line.slice(6).trim();
                    if (data === '[DONE]') break;

                    try {
                        const parsed = JSON.parse(data);
                        if (parsed.chunk) {
                            fullText += parsed.chunk;
                            aiDiv.innerHTML = formatText(fullText);
                            history.scrollTop = history.scrollHeight;
                        }
                    } catch (err) {}
                }
            }

            if (!fullText) {
                aiDiv.innerHTML = formatText("Sorry, I didn't get a response. Please try again.");
            }

        } catch (error) {
            loading.style.display = 'none';
            aiDiv.innerHTML = formatText("⚠️ Error connecting to the server. Please make sure the AI service is running.");
        }

        sendBtn.disabled = false;
        input.disabled = false;
        input.focus();
    });

    function formatText(text) {
        return text
            .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-semibold">$1</strong>')
            .replace(/^- /gm, '• ')
            .replace(/\n/g, '<br>');
    }

    function appendMessage(text, role) {
        const div = document.createElement('div');
        if (role === 'user') {
            div.className = 'max-w-[80%] self-end bg-gradient-to-br from-blue-500 to-violet-500 text-white px-5 py-3 rounded-2xl rounded-br-sm text-[0.95rem] leading-relaxed animate-slide-in shadow-lg shadow-violet-500/20';
        } else {
            div.className = 'max-w-[80%] self-start bg-slate-700/80 border border-white/[0.06] px-5 py-3 rounded-2xl rounded-bl-sm text-[0.95rem] leading-relaxed animate-slide-in';
        }
        div.innerHTML = formatText(text);
        history.insertBefore(div, loading);
        history.scrollTop = history.scrollHeight;
    }
</script>
</body>
</html>
